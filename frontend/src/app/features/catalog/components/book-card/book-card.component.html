<div class="card">
    <div class="cover-wrapper">
        @if (book.cover_path) {
        <img [src]="apiUrl + book.cover_path" [alt]="book.title" loading="lazy">
        } @else {
        <div class="placeholder-cover">
            <span>No Cover</span>
        </div>
        }
    </div>
    <div class="info">
        <h3 class="title" [title]="book.title">{{ book.title }}</h3>
        <p class="author">{{ book.authors }}</p>
        <div class="rating">
            @if (book.avg_rating !== null) {
                <span class="rating-value">{{ book.avg_rating.toFixed(1) }} / 10</span>
                <span class="rating-count">({{ book.reviews_count }})</span>
            } @else {
                <span class="no-rating">Нет оценок</span>
            }
        </div>
        <div class="actions">
            <button class="read-btn" (click)="onReadClick($event)">Читать</button>
            <button class="details-btn" (click)="onDetailsClick($event)">Подробнее</button>
        </div>
    </div>
</div>
