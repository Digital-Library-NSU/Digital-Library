<div class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <button class="close-btn" (click)="closeModal()">&times;</button>

        <h2>Upload New Book</h2>

        @if (!isSuccess) {
        <div class="upload-form">
            <p class="hint">Select an .epub file to add to the library</p>

            <input type="file" accept=".epub" (change)="onFileSelected($event)" [disabled]="isUploading" #fileInput>

            @if (errorMessage) {
            <div class="error-alert">
                {{ errorMessage }}
            </div>
            }

            <button class="upload-btn" [disabled]="!selectedFile || isUploading" (click)="upload()">
                @if (isUploading) {
                Uploading...
                } @else {
                Upload Book
                }
            </button>
        </div>
        }

        @if (isSuccess) {
        <div class="success-state">
            <div class="check-icon">✓</div>
            <h3>Success!</h3>
            <p>The book has been successfully imported.</p>
            <button class="upload-btn success" (click)="closeModal()">Close & Refresh</button>
        </div>
        }
    </div>
</div>
